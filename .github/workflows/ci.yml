name: CI

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: local_ai_support_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d local_ai_support_bot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/local_ai_support_bot_test
      DEFAULT_WORKSPACE_ID: ci-workspace
      AI_PROVIDER: ollama
      AI_CHAT_MODEL: llama3.1:8b
      AI_EMBEDDING_MODEL: llama3.1:8b

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI pipeline
        run: pnpm run ci
